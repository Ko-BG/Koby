<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADAK Enterprise Compliance AI</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
body { margin:0; font-family:Arial; background:#020617; color:#38bdf8;}
header { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid cyan;}
.tabs { display:flex; gap:10px; padding:10px;}
.tab { padding:10px; border:1px solid cyan; cursor:pointer;}
.active { background:cyan; color:black;}
.container { display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:20px;}
.card { border:1px solid cyan; padding:15px; border-radius:10px;}
#dropZone { border:2px dashed cyan; padding:30px; text-align:center;}
canvas { width:100%; border:1px solid cyan;}
.low{color:lime;} .medium{color:orange;} .high{color:red;}
input, select, button { margin:5px; padding:8px;}
</style>
</head>

<body>

<header>
<h2>⚡ ADAK Compliance AI System</h2>
<select id="role">
<option>Compliance Officer</option>
<option>Auditor</option>
</select>
</header>

<!-- 🔐 AUTH -->
<div class="card">
<h3>Login / Signup</h3>
<input id="email" placeholder="email@adak.or.ke">
<input id="password" type="password" placeholder="password">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<p id="userDisplay"></p>
</div>

<!-- 📑 TABS -->
<div class="tabs" id="tabs"></div>

<div class="container">

<!-- 📋 REQUIREMENTS -->
<div class="card">
<h3>Required Documents</h3>
<ul id="requirements"></ul>
</div>

<!-- 📤 UPLOAD -->
<div class="card">
<h3>Upload</h3>
<div id="dropZone">Drag & Drop File</div>
</div>

<!-- 📄 PDF -->
<div class="card">
<h3>PDF Viewer</h3>
<canvas id="pdfCanvas"></canvas>
</div>

<!-- ✍️ SIGN -->
<div class="card">
<h3>Sign & Secure</h3>
<canvas id="signPad"></canvas>
<button onclick="clearSign()">Clear</button>
<button onclick="signDoc()">Sign</button>
</div>

<!-- 🔎 SEARCH -->
<div class="card">
<h3>Search Documents</h3>
<input id="searchBox">
<button onclick="searchDocs()">Search</button>
<ul id="results"></ul>
</div>

<!-- 🤖 RISK -->
<div class="card">
<h3>AI Risk Score</h3>
<div id="riskDisplay"></div>
</div>

<!-- 📜 LEDGER -->
<div class="card">
<h3>Ledger</h3>
<button onclick="loadLedger()">Load Ledger</button>
<ul id="ledger"></ul>
</div>

</div>

<ul id="auditList"></ul>

<script>
const socket = io();
let currentUser = "";
let currentDept = "Testing";
let uploadedDocs = [];

// 📚 REQUIREMENTS (FROM YOUR DOC)
const requirementsMap = {
Testing: ["Sample Inventory","Lab Records","ABP Staff","Whereabouts Logs"],
Investigation: ["Whistleblower Policy","Investigation Reports"],
Results: ["RM SOP","Case Tracker","B Sample Logs"],
Education: ["Training Plan","Educator Logs"],
DataProtection: ["Incident Response Plan","Privacy Policy"]
};

// BUILD TABS
const tabsDiv = document.getElementById("tabs");
Object.keys(requirementsMap).forEach(dept=>{
  const t=document.createElement("div");
  t.className="tab";
  t.innerText=dept;
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    currentDept=dept;
    loadRequirements();
    loadRisk();
  };
  tabsDiv.appendChild(t);
});
tabsDiv.children[0].classList.add("active");

// LOAD REQUIREMENTS
function loadRequirements(){
  const ul=document.getElementById("requirements");
  ul.innerHTML="";
  requirementsMap[currentDept].forEach(r=>{
    const li=document.createElement("li");
    li.innerText = uploadedDocs.includes(r) ? "✅ "+r : "❌ "+r;
    ul.appendChild(li);
  });
}
loadRequirements();

// 🔐 AUTH
async function signup(){
  const res=await fetch("/signup",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email:email.value,password:password.value})});
  alert(await res.text());
}

async function login(){
  const res=await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({email:email.value,password:password.value})});
  const data=await res.json();
  currentUser=data.email;
  document.getElementById("userDisplay").innerText="Logged in: "+currentUser;
}

// 📤 DRAG DROP
dropZone.ondragover=e=>e.preventDefault();
dropZone.ondrop=async e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0];

  const fd=new FormData();
  fd.append("document",file);
  fd.append("department",currentDept);
  fd.append("user",currentUser);

  await fetch("/upload",{method:"POST",body:fd});

  uploadedDocs.push(file.name);
  loadRequirements();
  loadPDF(file);
};

// 📄 PDF VIEW
function loadPDF(file){
  const reader=new FileReader();
  reader.onload=function(){
    const arr=new Uint8Array(this.result);
    pdfjsLib.getDocument(arr).promise.then(pdf=>{
      pdf.getPage(1).then(page=>{
        const canvas=document.getElementById("pdfCanvas");
        const ctx=canvas.getContext("2d");
        const vp=page.getViewport({scale:1.5});
        canvas.height=vp.height;
        canvas.width=vp.width;
        page.render({canvasContext:ctx,viewport:vp});
      });
    });
  };
  reader.readAsArrayBuffer(file);
}

// ✍️ SIGN
const signCanvas=document.getElementById("signPad");
const ctx=signCanvas.getContext("2d");
let draw=false;
signCanvas.onmousedown=()=>{draw=true;ctx.beginPath();}
signCanvas.onmouseup=()=>draw=false;
signCanvas.onmousemove=e=>{
  if(!draw)return;
  ctx.lineTo(e.offsetX,e.offsetY);
  ctx.strokeStyle="cyan";
  ctx.stroke();
};

function clearSign(){ctx.clearRect(0,0,signCanvas.width,signCanvas.height);}

// 🔐 HASH + SIGN
async function signDoc(){
  const data=signCanvas.toDataURL();
  const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(data));
  const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");

  await fetch("/sign",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({user:currentUser,department:currentDept,hash})});

  alert("🔐 Signed & Secured");
}

// 🔎 SEARCH
async function searchDocs(){
  const q=searchBox.value;
  const res=await fetch(`/search?dept=${currentDept}&q=${q}`);
  const data=await res.json();

  const ul=document.getElementById("results");
  ul.innerHTML="";
  data.forEach(d=>{
    const li=document.createElement("li");
    li.innerText=d.name;
    ul.appendChild(li);
  });
}

// 🤖 RISK
async function loadRisk(){
  const res=await fetch(`/risk/${currentDept}`);
  const r=await res.json();
  document.getElementById("riskDisplay").innerText=`Score: ${r.score} (${r.level})`;
}

// 📜 LEDGER
async function loadLedger(){
  const res=await fetch("/ledger");
  const data=await res.json();

  const ul=document.getElementById("ledger");
  ul.innerHTML="";
  data.slice(-20).forEach(l=>{
    const li=document.createElement("li");
    li.innerText=`${l.action} | ${l.timestamp}`;
    ul.appendChild(li);
  });
}

// 📡 LIVE AUDIT
socket.on("auditUpdate", audit=>{
  const li=document.createElement("li");
  li.className=audit.riskLevel;
  li.innerText=`${audit.department} | Risk: ${audit.riskScore}`;
  document.getElementById("auditList").prepend(li);
});

// 👤 ROLE CONTROL
role.onchange=function(){
  signCanvas.style.display = this.value==="Auditor" ? "none":"block";
};
</script>

</body>
</html>
