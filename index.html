<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Love in Nairobi - STEAM EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #gui { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .hud { background: rgba(0,0,0,0.8); color: #0f0; padding: 15px; border-left: 5px solid #ff6600; margin-bottom: 10px; pointer-events: auto; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,10,10,0.95); color: white; padding: 40px; border: 2px solid #ff6600; text-align: center; z-index: 100; }
        .btn { background: #ff6600; border: none; color: white; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #dialogueBox { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 20px; border-top: 4px solid #ff6600; width: 50%; display: none; }
    </style>

<body>

<div id="gui">
    <div class="hud">
        <div>PLAYER: <span id="pName">Tileh</span></div>
        <div>STATUS: <span style="color:cyan">ONLINE</span></div>
    </div>
    <div class="hud">
        <strong>GLOBAL LEADERBOARD</strong>
        <div id="lb-data" style="font-size: 0.8em;"></div>
    </div>
</div>

<div id="customizer" class="overlay">
    <h2>LOVE IN NAIROBI</h2>
    <p>Main Character: Tileh (Buff Edition)</p>
    <input type="text" id="nameInput" placeholder="Enter Nickname..." style="padding: 10px;">
    <button class="btn" onclick="connectToServer()">START MULTIPLAYER</button>
</div>

<div id="dialogueBox"></div>

function connectToServer() {
    const name = document.getElementById('nameInput').value || "Tileh";
    document.getElementById('pName').innerText = name;
    document.getElementById('customizer').style.display = 'none';

    socket = io();
    socket.emit('join', { name: name, color: 0xffffff });

    init3D();
    setupNetworkListeners();
}

function init3D() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020205);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // City Map
    createNairobi();

    // Local Player Sprite
    const loader = new THREE.TextureLoader();
    const texture = loader.load(playerImg);
    const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
    player = new THREE.Sprite(material);
    player.scale.set(4, 4, 1);
    player.position.y = 2;
    scene.add(player);

    camera.position.set(0, 10, 15);
    animate();
}

function createNairobi() {
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({color: 0x111111}));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    for(let i=0; i<50; i++) {
        const h = 5 + Math.random()*20;
        const b = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), new THREE.MeshBasicMaterial({color: 0x333333}));
        b.position.set(Math.random()*200-100, h/2, Math.random()*200-100);
        scene.add(b);
    }
}

function setupNetworkListeners() {
    socket.on('currentPlayers', (players) => {
        Object.keys(players).forEach((id) => {
            if (id !== socket.id) addOtherPlayer(players[id]);
        });
    });

    socket.on('newPlayer', (playerInfo) => addOtherPlayer(playerInfo));

    socket.on('playerMoved', (playerInfo) => {
        if (otherPlayers[playerInfo.id]) {
            otherPlayers[playerInfo.id].position.set(playerInfo.x, 2, playerInfo.z);
        }
    });

    socket.on('updateLeaderboard', (data) => {
        const lb = document.getElementById('lb-data');
        lb.innerHTML = data.map(u => `<div>${u.name}: ${u.score}</div>`).join('');
    });
}

function addOtherPlayer(info) {
    const loader = new THREE.TextureLoader();
    const texture = loader.load(playerImg);
    const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.7 });
    const p = new THREE.Sprite(material);
    p.scale.set(4, 4, 1);
    p.position.set(info.x, 2, info.z);
    otherPlayers[info.id] = p;
    scene.add(p);
}

function animate() {
    requestAnimationFrame(animate);

    const speed = 0.3;
    if (moveKeys.w) player.position.z -= speed;
    if (moveKeys.s) player.position.z += speed;
    if (moveKeys.a) player.position.x -= speed;
    if (moveKeys.d) player.position.x += speed;

    if (socket && (moveKeys.w || moveKeys.s || moveKeys.a || moveKeys.d)) {
        socket.emit('playerMovement', { x: player.position.x, z: player.position.z });
    }

    camera.position.lerp(new THREE.Vector3(player.position.x, 8, player.position.z + 12), 0.1);
    camera.lookAt(player.position);
    renderer.render(scene, camera);
}

document.addEventListener('keydown', (e) => { if(moveKeys.hasOwnProperty(e.key.toLowerCase())) moveKeys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', (e) => { if(moveKeys.hasOwnProperty(e.key.toLowerCase())) moveKeys[e.key.toLowerCase()] = false; });
</script>
